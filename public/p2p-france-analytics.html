<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>France P2P Analytics — Abivax</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #F8F9FA;
      --surface: #FFFFFF;
      --ink: #111827;
      --muted: #64748B;
      --faint: #94A3B8;
      --border: #E2E8F0;
      --border-light: #F1F5F9;
      --teal: #0D9488;
      --teal-bg: #F0FDFA;
      --teal-light: #CCFBF1;
      --blue: #2563EB;
      --blue-bg: #EFF6FF;
      --amber: #D97706;
      --amber-bg: #FFFBEB;
      --amber-light: #FEF3C7;
      --rose: #E11D48;
      --rose-bg: #FFF1F2;
      --rose-light: #FFE4E6;
      --violet: #7C3AED;
      --violet-bg: #F5F3FF;
      --green: #059669;
      --green-bg: #ECFDF5;
      --slate: #334155;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow: 0 4px 16px rgba(0,0,0,0.06);
      --r: 12px;
      --r-lg: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; }
    body { font-family: "Inter", "Segoe UI", -apple-system, sans-serif; color: var(--ink); background: var(--bg); -webkit-font-smoothing: antialiased; }
    .shell { max-width: 1480px; margin: 0 auto; padding: 16px 20px 40px; }

    /* ---- HEADER ---- */
    .header { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 16px; padding: 20px 24px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--shadow-sm); }
    .header-left { flex: 1; }
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: 0.03em; }
    .badge-teal { background: var(--teal-light); color: var(--teal); }
    .header h1 { margin-top: 8px; font-size: 26px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.15; }
    .header-sub { margin-top: 4px; color: var(--muted); font-size: 13px; line-height: 1.5; max-width: 70ch; }
    .header-meta { display: flex; flex-direction: column; gap: 6px; min-width: 200px; }
    .meta-pill { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg); border-radius: 8px; font-size: 12px; }
    .meta-pill .label { color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: 0.06em; min-width: 50px; }
    .meta-pill .val { color: var(--ink); font-weight: 500; }

    /* ---- TABS ---- */
    .tabs { display: flex; gap: 4px; margin-bottom: 16px; position: sticky; top: 0; z-index: 10; padding: 6px 0; background: var(--bg); }
    .tab { padding: 9px 16px; border-radius: 8px; border: 1px solid transparent; background: transparent; color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .tab:hover { background: var(--surface); color: var(--ink); }
    .tab.active { background: var(--ink); color: #fff; border-color: var(--ink); }
    .view { display: none; }
    .view.active { display: block; }

    /* ---- CARDS ---- */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--shadow-sm); overflow: hidden; }
    .card-body { padding: 18px 20px; }
    .card-header { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; margin-bottom: 14px; }
    .card-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
    .card-title { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }
    .card-sublabel { font-size: 11px; color: var(--faint); }

    /* ---- GRIDS ---- */
    .g { display: grid; gap: 14px; }
    .g2 { grid-template-columns: 1fr 1fr; }
    .g3 { grid-template-columns: 1fr 1fr 1fr; }
    .g4 { grid-template-columns: repeat(4, 1fr); }
    .g-2-1 { grid-template-columns: 2fr 1fr; }
    .g-1-2 { grid-template-columns: 1fr 2fr; }
    .g-3-2 { grid-template-columns: 3fr 2fr; }
    .g-2-3 { grid-template-columns: 2fr 3fr; }

    /* ---- KPI TILES ---- */
    .kpi { padding: 16px 18px; border-radius: var(--r); border: 1px solid var(--border); }
    .kpi-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 6px; }
    .kpi-value { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; line-height: 1; font-variant-numeric: tabular-nums; }
    .kpi-sub { margin-top: 5px; font-size: 12px; color: var(--faint); line-height: 1.4; }
    .kpi-teal { background: var(--teal-bg); border-color: var(--teal-light); }
    .kpi-teal .kpi-value { color: var(--teal); }
    .kpi-blue { background: var(--blue-bg); border-color: #DBEAFE; }
    .kpi-blue .kpi-value { color: var(--blue); }
    .kpi-amber { background: var(--amber-bg); border-color: var(--amber-light); }
    .kpi-amber .kpi-value { color: var(--amber); }
    .kpi-rose { background: var(--rose-bg); border-color: var(--rose-light); }
    .kpi-rose .kpi-value { color: var(--rose); }
    .kpi-violet { background: var(--violet-bg); border-color: #EDE9FE; }
    .kpi-violet .kpi-value { color: var(--violet); }

    /* ---- INSIGHT BOXES ---- */
    .insight { padding: 14px 16px; border-radius: var(--r); border-left: 3px solid var(--border); background: var(--bg); }
    .insight-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
    .insight-body { font-size: 12.5px; color: var(--muted); line-height: 1.55; }
    .insight-teal { border-left-color: var(--teal); background: var(--teal-bg); }
    .insight-amber { border-left-color: var(--amber); background: var(--amber-bg); }
    .insight-rose { border-left-color: var(--rose); background: var(--rose-bg); }
    .insight-blue { border-left-color: var(--blue); background: var(--blue-bg); }
    .insight-violet { border-left-color: var(--violet); background: var(--violet-bg); }

    /* ---- BAR ROWS ---- */
    .bar-row { display: grid; grid-template-columns: 140px 1fr 110px; gap: 10px; align-items: center; padding: 5px 0; }
    .bar-name { font-size: 12px; font-weight: 600; color: var(--slate); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { height: 22px; border-radius: 6px; overflow: hidden; background: var(--border-light); position: relative; }
    .bar-fill { height: 100%; border-radius: 6px; transition: width 0.6s ease; }
    .bar-fill-teal { background: linear-gradient(90deg, #14B8A6, #0D9488); }
    .bar-fill-blue { background: linear-gradient(90deg, #60A5FA, #2563EB); }
    .bar-fill-amber { background: linear-gradient(90deg, #FBBF24, #D97706); }
    .bar-fill-rose { background: linear-gradient(90deg, #FB7185, #E11D48); }
    .bar-fill-violet { background: linear-gradient(90deg, #A78BFA, #7C3AED); }
    .bar-fill-slate { background: linear-gradient(90deg, #94A3B8, #475569); }
    .bar-pct { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.95); text-shadow: 0 1px 2px rgba(0,0,0,0.15); }
    .bar-val { font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; text-align: right; color: var(--ink); white-space: nowrap; }

    /* ---- TABLES ---- */
    .tbl-wrap { overflow: auto; border: 1px solid var(--border); border-radius: var(--r); background: var(--surface); }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { padding: 10px 10px; background: var(--bg); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); text-align: left; position: sticky; top: 0; z-index: 1; border-bottom: 1px solid var(--border); }
    td { padding: 9px 10px; border-bottom: 1px solid var(--border-light); vertical-align: top; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 500; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg); }

    /* ---- VALIDATION ---- */
    .val-row { display: grid; grid-template-columns: 80px 1fr 100px 100px 100px; gap: 10px; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--border-light); font-size: 12px; }
    .val-row:last-child { border-bottom: none; }
    .pill { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; text-align: center; }
    .pill-pass { background: #D1FAE5; color: #065F46; }
    .pill-warn { background: var(--amber-light); color: #92400E; }
    .pill-fail { background: var(--rose-light); color: #9F1239; }
    .val-label { font-weight: 600; color: var(--slate); }
    .val-note { font-size: 11px; color: var(--faint); margin-top: 2px; }
    .val-num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 500; }
    .val-head { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--faint); margin-bottom: 2px; }

    /* ---- CHART CONTAINERS ---- */
    .chart-wrap { position: relative; }
    .chart-wrap canvas { max-height: 320px; }
    .chart-wrap-lg canvas { max-height: 380px; }
    .chart-wrap-sm canvas { max-height: 260px; }

    /* ---- FOOTER ---- */
    .footer { margin-top: 20px; padding: 16px 20px; border-radius: var(--r-lg); background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .footer-text { font-size: 12px; color: var(--muted); }
    .footer-text strong { color: var(--ink); }

    /* ---- DONUT CENTER ---- */
    .donut-container { position: relative; display: flex; align-items: center; justify-content: center; }
    .donut-center { position: absolute; text-align: center; pointer-events: none; }
    .donut-center-value { font-size: 22px; font-weight: 700; color: var(--ink); letter-spacing: -0.02em; }
    .donut-center-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ---- LOADING ---- */
    .loading, .error { padding: 60px 20px; text-align: center; color: var(--muted); font-size: 14px; }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 1200px) { .g2, .g-2-1, .g-1-2, .g-3-2, .g-2-3 { grid-template-columns: 1fr; } }
    @media (max-width: 900px) { .g3, .g4 { grid-template-columns: 1fr 1fr; } .bar-row { grid-template-columns: 100px 1fr 90px; } }
    @media (max-width: 600px) { .g3, .g4 { grid-template-columns: 1fr; } .tabs { overflow-x: auto; } .header { flex-direction: column; } }
  </style>
</head>
<body>
  <div class="shell" id="app"><div class="loading">Loading France P2P Analytics...</div></div>

  <script>
    const $ = (sel, ctx = document) => ctx.querySelector(sel);
    const $$ = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];
    const app = document.getElementById("app");

    /* ---- Formatters ---- */
    const fmtEur = v => v == null || isNaN(+v) ? "—" : new Intl.NumberFormat("en-US", { style: "currency", currency: "EUR", maximumFractionDigits: 0 }).format(+v);
    const fmtK = v => { const n = +v; if (isNaN(n)) return "—"; if (Math.abs(n) >= 1e6) return `${(n/1e6).toFixed(1)}M`; if (Math.abs(n) >= 1e3) return `${(n/1e3).toFixed(0)}K`; return n.toFixed(0); };
    const fmtNum = (v, d = 0) => v == null || isNaN(+v) ? "—" : new Intl.NumberFormat("en-US", { minimumFractionDigits: d, maximumFractionDigits: d }).format(+v);
    const fmtPct = v => isFinite(v) ? `${v.toFixed(1)}%` : "—";
    const esc = v => String(v ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");

    /* ---- Palette ---- */
    const PAL = {
      teal: ["#14B8A6","#0D9488","#0F766E","#115E59","#134E4A","#0C4A3E","#083B32","#062E27"],
      blue: ["#60A5FA","#3B82F6","#2563EB","#1D4ED8"],
      amber: ["#FBBF24","#F59E0B","#D97706","#B45309"],
      rose: ["#FB7185","#F43F5E","#E11D48","#BE123C"],
      violet: ["#A78BFA","#8B5CF6","#7C3AED","#6D28D9"],
      slate: ["#94A3B8","#64748B","#475569","#334155"],
      aging: ["#2563EB","#94A3B8","#14B8A6","#0D9488","#D97706","#F59E0B","#F43F5E","#BE123C"]
    };

    /* ---- Chart defaults ---- */
    Chart.defaults.font.family = '"Inter","Segoe UI",-apple-system,sans-serif';
    Chart.defaults.font.size = 11;
    Chart.defaults.color = "#64748B";
    Chart.defaults.plugins.legend.display = false;
    Chart.defaults.animation.duration = 700;

    /* ---- Rendering ---- */
    const charts = [];
    function destroyCharts() { charts.forEach(c => c.destroy()); charts.length = 0; }

    function render(data) {
      const k = data.kpis, dq = data.dataQuality, ex = data.exclusions;
      const total = k.eurOpenLikelyActiveExpected || 1;
      const futurePct = k.futureDatedExposure / total * 100;
      const noDatePct = k.noDateExposure / total * 100;
      const topSupplier = data.supplierExposure[0];
      const topDept = data.departmentExposure[0];
      const topSupPct = topSupplier ? topSupplier.amount / total * 100 : 0;
      const topDeptPct = topDept ? topDept.amount / total * 100 : 0;
      const missingPoPct = dq.missingPoExposure / total * 100;

      app.innerHTML = `
        <!-- HEADER -->
        <div class="header">
          <div class="header-left">
            <span class="badge badge-teal">France SA &middot; ENGAGE 2026 &middot; EUR Only</span>
            <h1>Procure-to-Pay Operational Analytics</h1>
            <div class="header-sub">Operational exposure, aging, concentration, and data quality derived from Juliette's ENGAGE tracker. This is not a statutory AP balance — it is a process-quality and risk-visibility surface.</div>
          </div>
          <div class="header-meta">
            <div class="meta-pill"><span class="label">Source</span><span class="val">ENGAGE_2026.xlsx</span></div>
            <div class="meta-pill"><span class="label">As of</span><span class="val">${esc(data.asOfDate)}</span></div>
            <div class="meta-pill"><span class="label">Lines</span><span class="val">${fmtNum(k.eurOpenLikelyActiveLineCount)} active EUR rows</span></div>
          </div>
        </div>

        <!-- TABS -->
        <div class="tabs">
          <button class="tab active" data-tab="overview">Executive Summary</button>
          <button class="tab" data-tab="aging">Aging Analysis</button>
          <button class="tab" data-tab="concentration">Concentration</button>
          <button class="tab" data-tab="quality">Data Quality</button>
          <button class="tab" data-tab="erp">ERP Readiness</button>
          <button class="tab" data-tab="detail">Line Detail</button>
        </div>

        <!-- ========== TAB 1: EXECUTIVE SUMMARY ========== -->
        <section class="view active" data-view="overview">
          <div class="g g4" style="margin-bottom:14px">
            <div class="kpi kpi-teal">
              <div class="kpi-label">Active EUR Exposure</div>
              <div class="kpi-value">${fmtEur(k.eurOpenLikelyActiveExpected)}</div>
              <div class="kpi-sub">${fmtNum(k.eurOpenLikelyActiveLineCount)} lines across ${fmtNum(k.eurOpenLikelyActiveSupplierCount)} suppliers</div>
            </div>
            <div class="kpi kpi-blue">
              <div class="kpi-label">Already Booked</div>
              <div class="kpi-value">${fmtEur(k.eurOpenLikelyActiveBooked)}</div>
              <div class="kpi-sub">${fmtPct(k.eurOpenLikelyActiveBooked / total * 100)} of active exposure</div>
            </div>
            <div class="kpi kpi-amber">
              <div class="kpi-label">Future-Dated</div>
              <div class="kpi-value">${fmtEur(k.futureDatedExposure)}</div>
              <div class="kpi-sub">${fmtPct(futurePct)} forward commitments, not yet due</div>
            </div>
            <div class="kpi kpi-rose">
              <div class="kpi-label">Undated Exposure</div>
              <div class="kpi-value">${fmtEur(k.noDateExposure)}</div>
              <div class="kpi-sub">${fmtPct(noDatePct)} cannot be aged — date missing</div>
            </div>
          </div>

          <div class="g g-3-2">
            <div class="card">
              <div class="card-body">
                <div class="card-header"><div class="card-label">Exposure Composition</div></div>
                <div class="chart-wrap"><canvas id="ch-overview-split"></canvas></div>
              </div>
            </div>
            <div class="card">
              <div class="card-body">
                <div class="card-header"><div class="card-label">What the numbers are saying</div></div>
                <div class="g" style="gap:10px">
                  <div class="insight insight-teal">
                    <div class="insight-title">Concentration is extreme</div>
                    <div class="insight-body">${esc(topSupplier?.supplier || "Top supplier")} carries ${fmtPct(topSupPct)} of all active EUR. ${esc(topDept?.department || "Top dept")} owns ${fmtPct(topDeptPct)}. A single contract change moves the whole picture.</div>
                  </div>
                  <div class="insight insight-amber">
                    <div class="insight-title">${fmtPct(futurePct + noDatePct)} of exposure is not truly aged</div>
                    <div class="insight-body">Between future-dated commitments (${fmtEur(k.futureDatedExposure)}) and undated items (${fmtEur(k.noDateExposure)}), less than half the book can be properly aged today.</div>
                  </div>
                  <div class="insight insight-rose">
                    <div class="insight-title">${fmtPct(missingPoPct)} of exposure has no PO</div>
                    <div class="insight-body">${fmtEur(dq.missingPoExposure)} in active lines with no purchase order. This is the single strongest argument for mandatory PO workflow in NetSuite.</div>
                  </div>
                  <div class="insight insight-blue">
                    <div class="insight-title">Weighted average age: ${fmtNum(k.weightedAverageAgeDays, 1)} days</div>
                    <div class="insight-body">Calculated on dated, due-or-overdue items only. The real operational age is likely higher — undated items are excluded from this figure.</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- ========== TAB 2: AGING ========== -->
        <section class="view" data-view="aging">
          <div class="g g-3-2">
            <div class="card">
              <div class="card-body">
                <div class="card-header">
                  <div><div class="card-label">Aging Distribution</div><div class="card-title">Where the exposure sits by age</div></div>
                  <div class="card-sublabel">EUR amounts by aging bucket</div>
                </div>
                <div class="chart-wrap chart-wrap-lg"><canvas id="ch-aging-bar"></canvas></div>
              </div>
            </div>
            <div>
              <div class="card" style="margin-bottom:14px">
                <div class="card-body">
                  <div class="card-header"><div class="card-label">Aging Composition</div></div>
                  <div class="donut-container">
                    <div class="chart-wrap chart-wrap-sm"><canvas id="ch-aging-donut"></canvas></div>
                    <div class="donut-center">
                      <div class="donut-center-value">${fmtNum(k.eurOpenLikelyActiveLineCount)}</div>
                      <div class="donut-center-label">active lines</div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="card">
                <div class="card-body">
                  <div class="card-header"><div class="card-label">Read this as</div></div>
                  <div class="g" style="gap:8px">
                    <div class="insight insight-amber">
                      <div class="insight-title">Future + undated = ${fmtPct(futurePct + noDatePct)}</div>
                      <div class="insight-body">More than half the exposure sits outside normal aging windows. This is structural — the tracker carries commitments, not just payables.</div>
                    </div>
                    <div class="insight insight-rose">
                      <div class="insight-title">${fmtNum(data.agingBuckets.find(b => b.label === "365+ days")?.lines || 0)} lines over 365 days</div>
                      <div class="insight-body">${fmtEur(data.agingBuckets.find(b => b.label === "365+ days")?.amount || 0)} in very old exposure. These are likely milestone-dated items that need review, not true overdue AP.</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="card" style="margin-top:14px">
            <div class="card-body">
              <div class="card-header">
                <div><div class="card-label">Top Aged Items</div><div class="card-title">Largest current exposure by days open</div></div>
              </div>
              <div class="tbl-wrap" style="max-height:340px">
                <table>
                  <thead><tr><th>Supplier</th><th>Project</th><th>Dept</th><th style="text-align:right">Days Open</th><th style="text-align:right">Expected EUR</th><th style="text-align:right">Booked EUR</th><th>Date Source</th></tr></thead>
                  <tbody>${data.topAgedItems.filter(r => r.daysOpen > 0).slice(0, 12).map(r => `
                    <tr>
                      <td>${esc(r.supplier)}</td>
                      <td>${esc(r.project)}</td>
                      <td>${esc(r.department)}</td>
                      <td class="num"><strong>${fmtNum(r.daysOpen)}</strong></td>
                      <td class="num">${fmtEur(r.toBeExpected)}</td>
                      <td class="num">${fmtEur(r.alreadyBooked)}</td>
                      <td><span class="badge ${r.effectiveDateSource === 'invoice' ? 'badge-teal' : ''}" style="font-size:10px;padding:2px 7px;${r.effectiveDateSource !== 'invoice' ? 'background:#F1F5F9;color:#64748B' : ''}">${esc(r.effectiveDateSource)}</span></td>
                    </tr>`).join("")}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </section>

        <!-- ========== TAB 3: CONCENTRATION ========== -->
        <section class="view" data-view="concentration">
          <div class="g g2">
            <div class="card">
              <div class="card-body">
                <div class="card-header">
                  <div><div class="card-label">Supplier Concentration</div><div class="card-title">Who carries the exposure</div></div>
                </div>
                <div class="chart-wrap chart-wrap-lg"><canvas id="ch-supplier"></canvas></div>
              </div>
            </div>
            <div class="card">
              <div class="card-body">
                <div class="card-header">
                  <div><div class="card-label">Department Concentration</div><div class="card-title">Where exposure sits internally</div></div>
                </div>
                <div class="chart-wrap chart-wrap-lg"><canvas id="ch-dept"></canvas></div>
              </div>
            </div>
          </div>

          <div class="g g2" style="margin-top:14px">
            <div class="card">

      const tabs = $$(".tab"), views = $$(".view");

        buildCharts(data);

    /* ---- Chart Builders ---- */
    function buildCharts(data) {
      const k = data.kpis, dq = data.dataQuality, total = k.eurOpenLikelyActiveExpected || 1;

      /* Overview: Stacked horizontal bar showing exposure composition */
      const chOverview = document.getElementById("ch-overview-split");
      if (chOverview) {
        const datedDue = data.agingBuckets.filter(b => b.min !== null && b.min >= 0).reduce((s, b) => s + b.amount, 0);
        charts.push(new Chart(chOverview, {
          type: "bar",
          data: {
            labels: ["Active EUR Exposure"],
            datasets: [
              { label: "Dated & Due/Overdue", data: [datedDue], backgroundColor: "#0D9488", borderRadius: 4 },
              { label: "Future-Dated", data: [k.futureDatedExposure], backgroundColor: "#F59E0B", borderRadius: 4 },
              { label: "No Date", data: [k.noDateExposure], backgroundColor: "#94A3B8", borderRadius: 4 }
            ]
          },
          options: {
            indexAxis: "y",
            responsive: true, maintainAspectRatio: false,
            scales: {
              x: { stacked: true, ticks: { callback: v => fmtK(v) }, grid: { color: "#F1F5F9" }, border: { display: false } },
              y: { stacked: true, display: false }
            },
            plugins: {
              legend: { display: true, position: "bottom", labels: { usePointStyle: true, pointStyle: "rectRounded", padding: 16, font: { size: 11 } } },
              tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${fmtEur(ctx.raw)}` } }
            },
            layout: { padding: { top: 10, bottom: 4 } }
          }
        }));
      }

      /* Aging: Horizontal bar chart */
      const chAging = document.getElementById("ch-aging-bar");
      if (chAging) {
        const buckets = data.agingBuckets;
        const colors = ["#2563EB", "#94A3B8", "#14B8A6", "#0D9488", "#D97706", "#F59E0B", "#F43F5E", "#BE123C"];
        charts.push(new Chart(chAging, {
          type: "bar",
          data: {
            labels: buckets.map(b => b.label),
            datasets: [{
              data: buckets.map(b => b.amount),
              backgroundColor: colors,
              borderRadius: 6,
              barThickness: 28
            }]
          },
          options: {
            indexAxis: "y",
            responsive: true, maintainAspectRatio: false,
            scales: {
              x: { ticks: { callback: v => fmtK(v) }, grid: { color: "#F1F5F9" }, border: { display: false } },
              y: { grid: { display: false }, border: { display: false }, ticks: { font: { weight: 600, size: 12 } } }
            },
            plugins: {
              tooltip: {
                callbacks: {
                  label: ctx => {
                    const b = buckets[ctx.dataIndex];
                    return [`${fmtEur(b.amount)}`, `${fmtNum(b.lines)} lines`, `${fmtPct(b.amount / total * 100)} of active`];
                  }
                }
              }
            }
          }
        }));
      }

      /* Aging donut */
      const chAgingDonut = document.getElementById("ch-aging-donut");
      if (chAgingDonut) {
        const buckets = data.agingBuckets;
        charts.push(new Chart(chAgingDonut, {
          type: "doughnut",
          data: {
            labels: buckets.map(b => b.label),
            datasets: [{ data: buckets.map(b => b.lines), backgroundColor: PAL.aging, borderWidth: 2, borderColor: "#fff" }]
          },
          options: {
            cutout: "62%", responsive: true, maintainAspectRatio: true,
            plugins: {
              tooltip: { callbacks: { label: ctx => `${ctx.label}: ${fmtNum(ctx.raw)} lines (${fmtPct(ctx.raw / k.eurOpenLikelyActiveLineCount * 100)})` } }
            }
          }
        }));
      }

      /* Supplier horizontal bar */
      const chSupplier = document.getElementById("ch-supplier");
      if (chSupplier) {
        const items = data.supplierExposure.slice(0, 10);
        charts.push(new Chart(chSupplier, {
          type: "bar",
          data: {
            labels: items.map(i => i.supplier.length > 22 ? i.supplier.substring(0, 20) + "..." : i.supplier),
            datasets: [{ data: items.map(i => i.amount), backgroundColor: items.map((_, idx) => idx === 0 ? "#E11D48" : "#60A5FA"), borderRadius: 5, barThickness: 24 }]
          },
          options: {
            indexAxis: "y", responsive: true, maintainAspectRatio: false,
            scales: {
              x: { ticks: { callback: v => fmtK(v) }, grid: { color: "#F1F5F9" }, border: { display: false } },
              y: { grid: { display: false }, border: { display: false }, ticks: { font: { size: 11, weight: 500 } } }
            },
            plugins: { tooltip: { callbacks: { label: ctx => `${fmtEur(ctx.raw)} (${fmtPct(ctx.raw / total * 100)})` } } }
          }
        }));
      }

      /* Department horizontal bar */
      const chDept = document.getElementById("ch-dept");
      if (chDept) {
        const items = data.departmentExposure.slice(0, 10);
        charts.push(new Chart(chDept, {
          type: "bar",
          data: {
            labels: items.map(i => i.department),
            datasets: [{ data: items.map(i => i.amount), backgroundColor: items.map((_, idx) => idx === 0 ? "#D97706" : "#14B8A6"), borderRadius: 5, barThickness: 24 }]
          },
          options: {
            indexAxis: "y", responsive: true, maintainAspectRatio: false,
            scales: {
              x: { ticks: { callback: v => fmtK(v) }, grid: { color: "#F1F5F9" }, border: { display: false } },
              y: { grid: { display: false }, border: { display: false }, ticks: { font: { size: 11, weight: 500 } } }
            },
            plugins: { tooltip: { callbacks: { label: ctx => `${fmtEur(ctx.raw)} (${fmtPct(ctx.raw / total * 100)})` } } }
          }
        }));
      }

      /* Project horizontal bar */
      const chProject = document.getElementById("ch-project");
      if (chProject) {
        const items = data.projectExposure.slice(0, 10);
        charts.push(new Chart(chProject, {
          type: "bar",
          data: {
            labels: items.map(i => i.project),
            datasets: [{ data: items.map(i => i.amount), backgroundColor: items.map((_, idx) => PAL.violet[Math.min(idx, PAL.violet.length - 1)]), borderRadius: 5, barThickness: 24 }]
          },
          options: {
            indexAxis: "y", responsive: true, maintainAspectRatio: false,
            scales: {
              x: { ticks: { callback: v => fmtK(v) }, grid: { color: "#F1F5F9" }, border: { display: false } },
              y: { grid: { display: false }, border: { display: false }, ticks: { font: { size: 11, weight: 500 } } }
            },
            plugins: { tooltip: { callbacks: { label: ctx => `${fmtEur(ctx.raw)} (${fmtPct(ctx.raw / total * 100)})` } } }
          }
        }));
      }

      /* Currency donut */
      const chCurrency = document.getElementById("ch-currency");
      if (chCurrency) {
        const items = data.currencyMix.filter(c => c.toBeExpected > 0);
        charts.push(new Chart(chCurrency, {
          type: "doughnut",
          data: {
            labels: items.map(c => c.currency),
            datasets: [{ data: items.map(c => c.toBeExpected), backgroundColor: ["#0D9488", "#F59E0B", "#2563EB", "#E11D48", "#7C3AED", "#64748B", "#059669"], borderWidth: 2, borderColor: "#fff" }]
          },
          options: {
            cutout: "55%", responsive: true, maintainAspectRatio: true,
            plugins: {
              legend: { display: true, position: "bottom", labels: { usePointStyle: true, pointStyle: "rectRounded", padding: 12, font: { size: 11 } } },
              tooltip: { callbacks: { label: ctx => `${ctx.label}: ${fmtEur(ctx.raw)}` } }
            }
          }
        }));
      }

      /* Data Quality: Grouped bar showing lines vs exposure */
      const chQuality = document.getElementById("ch-quality");
      if (chQuality) {
        const labels = ["Missing PO", "Missing Invoice", "Missing Date", "Future-Dated"];
        const lineData = [dq.missingPoLines, dq.missingInvoiceLines, dq.missingDateLines, dq.futureDatedLines];
        const eurData = [dq.missingPoExposure, dq.missingInvoiceExposure, dq.missingDateExposure, dq.futureDatedExposure];
        charts.push(new Chart(chQuality, {
          type: "bar",
          data: {
            labels: labels,
            datasets: [
              { label: "EUR Exposure", data: eurData, backgroundColor: ["#D97706", "#E11D48", "#7C3AED", "#2563EB"], borderRadius: 6, barThickness: 32 }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            scales: {
              x: { grid: { display: false }, border: { display: false }, ticks: { font: { weight: 600 } } },
              y: { ticks: { callback: v => fmtK(v) }, grid: { color: "#F1F5F9" }, border: { display: false } }
            },
            plugins: {
              legend: { display: false },
              tooltip: { callbacks: { label: ctx => [`${fmtEur(ctx.raw)}`, `${fmtNum(lineData[ctx.dataIndex])} lines`, `${fmtPct(ctx.raw / total * 100)} of active exposure`] } }
            }
          }
        }));
      }

      /* Data Quality donut: clean vs issues */
      const chQualityDonut = document.getElementById("ch-quality-donut");
      if (chQualityDonut) {
        const hasAllData = total - dq.missingPoExposure;
        charts.push(new Chart(chQualityDonut, {
          type: "doughnut",
          data: {
            labels: ["Has PO", "Missing PO"],
            datasets: [{ data: [Math.max(0, hasAllData), dq.missingPoExposure], backgroundColor: ["#14B8A6", "#D97706"], borderWidth: 2, borderColor: "#fff" }]
          },
          options: {
            cutout: "60%", responsive: true, maintainAspectRatio: true,
            plugins: {
              legend: { display: true, position: "bottom", labels: { usePointStyle: true, pointStyle: "rectRounded", padding: 12, font: { size: 11 } } },
              tooltip: { callbacks: { label: ctx => `${ctx.label}: ${fmtEur(ctx.raw)} (${fmtPct(ctx.raw / total * 100)})` } }
            }
          }
        }));
      }

      /* ERP: Bridge waterfall */
      const chBridge = document.getElementById("ch-bridge");
      if (chBridge) {
        const ex = data.exclusions;
        charts.push(new Chart(chBridge, {
          type: "bar",
          data: {
            labels: ["Gross EUR", "Removed", "OUT State", "Closed", "Active EUR"],
            datasets: [
              { label: "Base", data: [0, k.eurOpenGrossExpected - ex.removedFlagAmount, k.eurOpenGrossExpected - ex.removedFlagAmount - ex.outStateAmount, k.eurOpenGrossExpected - ex.removedFlagAmount - ex.outStateAmount - ex.closedStateAmount, 0], backgroundColor: "transparent", borderWidth: 0 },
              { label: "Change", data: [k.eurOpenGrossExpected, -ex.removedFlagAmount, -ex.outStateAmount, -ex.closedStateAmount, k.eurOpenLikelyActiveExpected], backgroundColor: ["#0D9488", "#F43F5E", "#F43F5E", "#F43F5E", "#2563EB"], borderRadius: 4, barThickness: 28 }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            scales: {
              x: { stacked: true, grid: { display: false }, border: { display: false }, ticks: { font: { size: 10, weight: 600 } } },
              y: { stacked: true, ticks: { callback: v => fmtK(v) }, grid: { color: "#F1F5F9" }, border: { display: false } }
            },
            plugins: {
              legend: { display: false },
              tooltip: { filter: ctx => ctx.datasetIndex === 1, callbacks: { label: ctx => fmtEur(Math.abs(ctx.raw)) } }
            }
          }
        }));
      }
    }

    /* ---- Load Data ---- */
    fetch("/engage-france-analytics.json", { cache: "no-store" })
      .then(res => { if (!res.ok) throw new Error(`HTTP ${res.status}`); return res.json(); })
      .then(render)
      .catch(err => { app.innerHTML = `<div class="error">Failed to load analytics: ${esc(err.message)}</div>`; });
  </script>
</body>
</html>
